services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_API_KEY: ${APP_API_KEY:-}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      UPLOAD_DIR: /app/data/uploads
      FAISS_INDEX_PATH: /app/data/faiss_index
      LOCAL_LLM_ENDPOINT: ${LOCAL_LLM_ENDPOINT:-http://host.docker.internal:11434/api/generate}
      LOCAL_VISION_ENDPOINT: ${LOCAL_VISION_ENDPOINT:-http://host.docker.internal:11434/api/chat}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
